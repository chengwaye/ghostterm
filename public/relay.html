<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Claude Remote - Relay</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<style>
  :root { --bg:#0f0f1a; --surface:#1a1a2e; --primary:#8b5cf6; --text:#e2e8f0; --text-dim:#94a3b8; --border:#2d2d50; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; background:var(--bg); color:var(--text); font-family:-apple-system,system-ui,sans-serif; overflow:hidden; position:fixed; width:100%; }

  /* Pairing Screen */
  #pair-screen {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    height:100%; gap:20px; padding:20px;
  }
  #pair-screen h1 { font-size:24px; color:var(--primary); }
  #pair-screen p { color:var(--text-dim); text-align:center; font-size:14px; }
  #pair-screen input {
    width:200px; height:56px; text-align:center; font-size:28px; letter-spacing:8px;
    background:var(--surface); border:2px solid var(--border); border-radius:12px;
    color:var(--text); outline:none; font-family:monospace;
  }
  #pair-screen input:focus { border-color:var(--primary); }
  #pair-btn {
    width:200px; height:48px; background:var(--primary); border:none; border-radius:12px;
    color:white; font-size:16px; font-weight:700; cursor:pointer;
  }
  #pair-btn:disabled { opacity:0.5; }
  #pair-status { color:var(--text-dim); font-size:13px; min-height:20px; }

  /* Terminal Screen */
  #term-screen { display:none; flex-direction:column; height:100%; }
  #term-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:8px 12px; background:var(--surface); border-bottom:1px solid var(--border);
    min-height:44px;
  }
  .hdr-left { display:flex; align-items:center; gap:8px; }
  .hdr-dot { width:8px; height:8px; border-radius:50%; background:#10b981; }
  .hdr-text { font-size:13px; color:var(--text-dim); }
  #terminal-container { flex:1; min-height:0; background:#000; overflow:hidden; }
  #terminal-container .xterm { padding:4px; height:100%; }

  /* Controls */
  #controls { background:var(--surface); border-top:1px solid var(--border); padding:8px; }
  .btn-row { display:flex; gap:6px; margin-bottom:6px; }
  .btn-row:last-child { margin-bottom:0; }
  .btn {
    flex:1; height:42px; border:1px solid var(--border); border-radius:10px;
    background:#252545; color:var(--text); font-size:13px; font-weight:600;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
  }
  .btn:active { background:var(--primary); border-color:var(--primary); }
  .btn.green { border-color:#10b981; color:#10b981; }
  .btn.red { border-color:#ef4444; color:#ef4444; }
  .btn.purple { background:var(--primary); color:white; }

  /* Input bar */
  #input-bar {
    display:flex; gap:6px; padding:6px 8px; background:var(--surface);
    border-top:1px solid var(--border);
  }
  #input-bar input {
    flex:1; height:42px; background:var(--bg); border:1px solid var(--border);
    border-radius:10px; color:var(--text); font-size:16px; padding:0 12px;
    outline:none; font-family:monospace;
  }
  #input-bar input:focus { border-color:var(--primary); }
  .send-btn {
    width:64px; height:42px; background:var(--primary); border:none;
    border-radius:10px; color:white; font-weight:700; font-size:14px; cursor:pointer;
  }
</style>
</head>
<body>

<!-- Pairing Screen -->
<div id="pair-screen">
  <h1>Claude Remote</h1>
  <p>Enter the pairing code<br>shown on your computer</p>
  <input type="tel" id="pair-code" maxlength="6" placeholder="000000" autocomplete="off">
  <button id="pair-btn" onclick="doPair()">Connect</button>
  <div id="pair-status"></div>
</div>

<!-- Terminal Screen -->
<div id="term-screen">
  <div id="term-header">
    <div class="hdr-left">
      <div class="hdr-dot" id="connDot"></div>
      <span class="hdr-text" id="connText">Connected</span>
    </div>
  </div>
  <div id="terminal-container"></div>
  <div id="controls">
    <div class="btn-row">
      <button class="btn green" onclick="send('y\r')">y</button>
      <button class="btn red" onclick="send('n\r')">n</button>
      <button class="btn" onclick="send('\x1b')">Esc</button>
      <button class="btn red" onclick="send('\x03')">Stop</button>
      <button class="btn" onclick="send('\t')">Tab</button>
      <button class="btn" onclick="send('\x7f')">Bksp</button>
    </div>
    <div class="btn-row">
      <button class="btn" onclick="send('\x1b[A')">↑</button>
      <button class="btn" onclick="send('\x1b[D')">←</button>
      <button class="btn purple" onclick="send('\r')">Enter</button>
      <button class="btn" onclick="send('\x1b[C')">→</button>
      <button class="btn" onclick="send('\x1b[B')">↓</button>
      <button class="btn" onclick="send(' ')">Space</button>
    </div>
  </div>
  <div id="input-bar">
    <input type="text" id="textInput" placeholder="Type command..." autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="send-btn" onclick="sendText()">Send</button>
  </div>
</div>

<script>
// ==================== Config ====================
const RELAY_URL = `ws://${location.hostname}:4000?role=mobile`;

let ws = null;
let currentSessionId = null;
let bufferSeqs = {};

// ==================== Terminal ====================
const termContainer = document.getElementById('terminal-container');
const term = new Terminal({
  cursorBlink: true, fontSize: 13,
  fontFamily: "'Menlo','Monaco','Courier New',monospace",
  scrollback: 10000,
  theme: { background:'#000', foreground:'#e2e8f0', cursor:'#8b5cf6' },
});
const fitAddon = new FitAddon.FitAddon();
term.loadAddon(fitAddon);
term.open(termContainer);

term.onData((data) => {
  wsSend({ type: 'input', sessionId: currentSessionId, data });
});

// ==================== WebSocket ====================
function connectRelay() {
  ws = new WebSocket(RELAY_URL);

  ws.onopen = () => {
    console.log('Connected to relay');
  };

  ws.onmessage = (e) => {
    let msg;
    try { msg = JSON.parse(e.data); } catch { return; }
    handleMessage(msg);
  };

  ws.onclose = () => {
    document.getElementById('connDot').style.background = '#ef4444';
    document.getElementById('connText').textContent = 'Disconnected';
    setTimeout(connectRelay, 3000);
  };
}

function wsSend(msg) {
  if (ws?.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(msg));
  }
}

// ==================== Pairing ====================
function doPair() {
  const code = document.getElementById('pair-code').value.trim();
  if (code.length !== 6) {
    document.getElementById('pair-status').textContent = 'Please enter 6-digit code';
    return;
  }
  document.getElementById('pair-btn').disabled = true;
  document.getElementById('pair-status').textContent = 'Connecting...';
  connectRelay();

  // Wait for WebSocket to open, then send pair request
  const checkReady = setInterval(() => {
    if (ws?.readyState === WebSocket.OPEN) {
      clearInterval(checkReady);
      wsSend({ type: 'pair', code });
    }
  }, 100);
}

// ==================== Handle Messages ====================
function handleMessage(msg) {
  switch (msg.type) {
    case 'paired':
      // Success — show terminal
      document.getElementById('pair-screen').style.display = 'none';
      document.getElementById('term-screen').style.display = 'flex';
      setTimeout(() => {
        fitAddon.fit();
        wsSend({ type: 'resize', sessionId: currentSessionId, cols: term.cols, rows: term.rows });
      }, 200);
      break;

    case 'pair_error':
      document.getElementById('pair-status').textContent = msg.message;
      document.getElementById('pair-btn').disabled = false;
      break;

    case 'sessions':
      // Got session list
      if (msg.list?.length > 0 && !currentSessionId) {
        currentSessionId = msg.list[0].id;
      }
      break;

    case 'attached':
      currentSessionId = msg.id;
      bufferSeqs[msg.id] = bufferSeqs[msg.id] || 0;
      wsSend({ type: 'sync', id: msg.id, clientSeq: bufferSeqs[msg.id] || 0 });
      wsSend({ type: 'resize', sessionId: msg.id, cols: term.cols, rows: term.rows });
      document.getElementById('connText').textContent = 'T' + msg.id + ' Connected';
      break;

    case 'output':
      if (msg.id !== undefined) bufferSeqs[msg.id] = msg.seq;
      if (msg.id === currentSessionId || msg.id === undefined) {
        term.write(msg.data);
      }
      break;

    case 'delta':
      if (msg.id) bufferSeqs[msg.id] = msg.seq;
      if ((msg.id || currentSessionId) === currentSessionId && msg.data) {
        term.write(msg.data);
      }
      break;

    case 'history':
      if (msg.id) bufferSeqs[msg.id] = msg.seq;
      if ((msg.id || currentSessionId) === currentSessionId) {
        term.reset();
        term.write(msg.data, () => term.scrollToBottom());
      }
      break;

    case 'exit':
      term.writeln('\r\n\x1b[33m[Session ended]\x1b[0m');
      break;

    case 'error_msg':
      term.writeln('\r\n\x1b[31m[' + msg.message + ']\x1b[0m');
      break;

    case 'companion_disconnected':
      document.getElementById('connDot').style.background = '#ef4444';
      document.getElementById('connText').textContent = 'PC disconnected';
      break;

    case 'upload_result':
      term.writeln('\r\n\x1b[32m[Uploaded: ' + msg.path + ']\x1b[0m');
      break;
  }
}

// ==================== Controls ====================
function send(data) {
  if (navigator.vibrate) navigator.vibrate(15);
  wsSend({ type: 'input', sessionId: currentSessionId, data });
}

function sendText() {
  const input = document.getElementById('textInput');
  if (!input.value) return;
  wsSend({ type: 'input', sessionId: currentSessionId, data: input.value + '\r' });
  input.value = '';
}

document.getElementById('textInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); sendText(); }
});

// Resize
window.addEventListener('resize', () => {
  try {
    fitAddon.fit();
    wsSend({ type: 'resize', sessionId: currentSessionId, cols: term.cols, rows: term.rows });
  } catch {}
});

// Auto-focus code input
document.getElementById('pair-code').focus();
document.getElementById('pair-code').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') doPair();
});
</script>
</body>
</html>
